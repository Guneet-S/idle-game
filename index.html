<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-first viewport settings to prevent zooming and elastic scrolling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Idle Gold Miner Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    
    <header class="top-bar glass-panel-header">
      <div class="gold-display">
        <div class="gold-icon-container">
          <span class="gold-icon">💰</span>
        </div>
        <div class="gold-text-container">
          <span id="gold-value" class="gold-amount">0</span>
          <div class="gps-display">
            <span id="gps-value">0</span> gold/sec
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- MINE TAB -->
      <section id="tab-mine" class="tab-content active view-mine">
        <div class="mining-area">
          <div class="mine-halo"></div>
          <button id="mine-btn" class="mine-button">
            <div class="mine-button-inner">
              <span class="mine-emoji">⛏️</span>
              <span class="mine-label">TAP TO MINE</span>
            </div>
          </button>
        </div>
      </section>

      <!-- SHOP TAB -->
      <section id="tab-shop" class="tab-content view-shop">
        <div class="shop-header">
          <h2 class="section-title">Upgrades</h2>
          <p class="section-subtitle">Hire workers to automate mining.</p>
        </div>
        <div class="shop-list">
          <div class="shop-card glass-panel">
            <div class="shop-icon-wrapper">
              <div class="shop-icon">👷</div>
            </div>
            <div class="shop-info">
              <h3>Miner</h3>
              <p>Produces 1 gold per sec.</p>
              <div class="shop-stats">Owned: <span id="worker-value">0</span></div>
            </div>
            <button id="buy-worker" class="buy-btn">
              <span class="cost-amount">10</span> <span class="cost-icon">💰</span>
            </button>
          </div>
          
          <div class="shop-card glass-panel locked">
            <div class="shop-icon-wrapper">
              <div class="shop-icon">🏭</div>
            </div>
            <div class="shop-info">
              <h3>Mine Shaft</h3>
              <p>Coming Soon...</p>
            </div>
            <button class="buy-btn disabled-visual" disabled>
              🔒
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="tab-mine">
        <div class="nav-icon-container">
          <span class="nav-icon">⛏️</span>
        </div>
        <span class="nav-text">Mine</span>
      </button>
      <button class="nav-btn" data-tab="tab-shop">
        <div class="nav-icon-container">
          <span class="nav-icon">🛒</span>
        </div>
        <span class="nav-text">Shop</span>
      </button>
    </nav>
  </div>
  <script src="game.js"></script>
</body>
</html>
