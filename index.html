<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>Shape Forge</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="currency-display">
        <span class="currency-icon">💵</span>
        <div class="currency-info">
          <div id="cash-value" class="currency-amount">0</div>
          <div class="rate-display"><span id="cash-rate-value">0</span> /sec</div>
        </div>
      </div>
      <button id="manual-mine-btn" class="mine-btn">
        <span class="mine-icon">⛏️</span> Tap Mine
      </button>
    </header>

    <!-- Main Scrollable Area -->
    <main class="main-content">
      <div id="containers-list" class="containers-list">
        <!-- Containers generated by JS -->
      </div>
    </main>
  </div>

  <template id="container-template">
    <div class="container-card">
      <div class="card-header">
        <div class="container-icon-box">
          <span class="container-icon"></span>
        </div>
        <div class="container-title-area">
          <h3 class="container-name">Name</h3>
          <div class="container-level">Lv. <span class="level-val">1</span></div>
        </div>
        <div class="inventory-box">
          <div class="inv-label">Waiting</div>
          <div class="inv-amount">0</div>
        </div>
      </div>

      <div class="card-body">
        <div class="progress-section">
          <div class="progress-track">
            <div class="progress-fill"></div>
            <div class="progress-text">Processing...</div>
          </div>
        </div>

        <div class="upgrade-section">
          <button class="upg-btn speed-btn">
            <div class="upg-title">Speed</div>
            <div class="upg-cost">$0</div>
            <div class="upg-eff speed-val">1.0s</div>
          </button>
          <button class="upg-btn eff-btn">
            <div class="upg-title">Efficiency</div>
            <div class="upg-cost">$0</div>
            <div class="upg-eff eff-val">0%</div>
          </button>
          <button class="upg-btn cap-btn">
            <div class="upg-title">Capacity</div>
            <div class="upg-cost">$0</div>
            <div class="upg-eff cap-val">1x</div>
          </button>
        </div>
      </div>
      
      <div class="locked-overlay">
        <div class="locked-text">Next Processor</div>
        <button class="unlock-btn">Unlock for $<span>0</span></button>
      </div>
    </div>
  </template>

  <script src="game.js"></script>
</body>
</html>
