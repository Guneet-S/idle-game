<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Leek Factory Tycoon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="game-app">
    <!-- Top Nav -->
    <header class="top-nav">
      <div class="nav-stat">
        <span class="stat-title">Revenue</span>
        <span class="stat-val"><span id="rev-val">0</span>🪙 /m</span>
      </div>
      <div class="nav-stat">
         <span class="stat-title">World Rank</span>
         <span class="stat-val">#<span id="rank-val">9999</span></span>
      </div>
      <div class="nav-stat primary-stat">
         <span class="stat-title">Gold</span>
         <span class="stat-val">🪙 <span id="cash-val">50</span></span>
      </div>
    </header>

    <div class="main-split">
      <!-- Left Map Area -->
      <div class="map-area" id="map-area">
        
        <!-- Dirt/Grass Background Detail -->
        <div class="map-bg"></div>

        <!-- SVG Conveyor Belt -->
        <svg viewBox="0 0 100 100" id="belt-svg" preserveAspectRatio="none">
          <!-- Background dark pad -->
          <path id="track" d="M -5 20 L 25 20 L 25 70 L 65 70 L 65 30 L 105 30" fill="none" stroke="#2f3542" stroke-width="8" />
          <!-- Animated yellow dashed lines -->
          <path d="M -5 20 L 25 20 L 25 70 L 65 70 L 65 30 L 105 30" fill="none" stroke="#fbc531" stroke-width="7" stroke-dasharray="2 2" class="belt-lines" />
          <!-- Inner dark belt -->
          <path d="M -5 20 L 25 20 L 25 70 L 65 70 L 65 30 L 105 30" fill="none" stroke="#222" stroke-width="6" />
        </svg>

        <!-- Plots Layer (Absolute DOM nodes pinned to SVG path) -->
        <div id="plots-layer"></div>
        
        <!-- Items Layer -->
        <div id="items-layer"></div>

        <!-- Start Spawner -->
        <div class="spawner-node">
           <div class="spawner-icon">🌿</div>
           <div class="spawner-lbl">Spawner</div>
           <div class="progress-bar"><div class="progress-fill" id="spawner-fill"></div></div>
           <button class="upg-btn" id="spawner-upg-btn">Upg $<span id="s-upg-cost">10</span></button>
        </div>
      </div>

      <!-- Right PRICING BOARD / RESTAURANT Area -->
      <div class="side-sidebar">
        <div class="restaurant-roof"></div>
        <div class="price-board-container">
           <div class="board-wood">
             <h3 class="board-title">Sell Prices</h3>
             <ul class="price-list" id="price-list">
               <!-- JS populated -->
             </ul>
           </div>
        </div>
        <div class="prestige-box">
           <button id="prestige-btn" class="prestige-btn hidden">Prestige ♻️</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Build Modal Overlay -->
  <div id="build-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">Select Factory <span id="close-modal" class="close">✖</span></div>
      <div class="shop-list" id="shop-list"></div>
    </div>
  </div>
  
  <!-- Upgrade Modal Overlay -->
  <div id="upgrade-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">Manage Factory <span id="close-upg-modal" class="close">✖</span></div>
      <div class="factory-details">
        <h2 id="fac-name">Processor</h2>
        <div class="fac-stats">
          Speed: <span id="fac-speed">2.0s</span>
        </div>
        <button id="fac-upg-btn" class="action-btn">Upgrade ($<span id="fac-upg-cost">0</span>)</button>
        <button id="fac-sell-btn" class="action-btn danger">Sell Factory (50% refund)</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
